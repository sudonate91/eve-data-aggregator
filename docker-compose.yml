services:
  # ── Single container: MySQL 8.4 + Node.js app bundled together ──────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: eve-data-aggregator
    ports:
      # Auth + setup web UI — open http://<host-ip>:3000 after first install
      - "3000:3000"
      # External MySQL access for Workbench / PowerBI — avoids conflict with host MySQL
      - "3307:3306"
    environment:
      - AUTH_PORT=3000
      - CLIENT_ID=${CLIENT_ID}
      - CALLBACK_URL=${CALLBACK_URL}
      - SCOPE=${SCOPE}
      - STATE=${STATE}
      - CORPORATION_ID=${CORPORATION_ID}
      - STRUCT_CORPORATION_ID=${STRUCT_CORPORATION_ID}
      - VEN0M_CORPORATION_ID=${VEN0M_CORPORATION_ID}
      - KRYTEK_CORPORATION_ID=${KRYTEK_CORPORATION_ID}
      - S0B_MART_CORPORATION_ID=${S0B_MART_CORPORATION_ID}
      - JANICE_API_KEY=${JANICE_API_KEY}
      # MySQL runs inside the same container — connect on localhost
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME:-S0b}
      - S0b_STRUCT_DB_NAME=${S0b_STRUCT_DB_NAME:-S0b_Struct}
      - VEN0M_DB_NAME=${VEN0M_DB_NAME:-Ven0m}
      - KRYTEK_DB_NAME=${KRYTEK_DB_NAME:-KryTek}
      - S0B_MART_DB_NAME=${S0B_MART_DB_NAME:-S0b_Mart}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_READONLY_PASSWORD=${MYSQL_READONLY_PASSWORD:-${DB_PASSWORD}}
      - ROOT_USER=root
      - ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - USE_ENV_CONFIG=${USE_ENV_CONFIG:-true}
      - RUN_INTERVAL_MINUTES=${RUN_INTERVAL_MINUTES:-60}
      - ENABLE_S0B_WALLET=${ENABLE_S0B_WALLET:-true}
      - ENABLE_S0B_STRUCT_WALLET=${ENABLE_S0B_STRUCT_WALLET:-false}
      - ENABLE_VEN0M_WALLET=${ENABLE_VEN0M_WALLET:-false}
      - ENABLE_KRYTEK_WALLET=${ENABLE_KRYTEK_WALLET:-false}
      - ENABLE_S0B_MART_WALLET=${ENABLE_S0B_MART_WALLET:-false}
      - ENABLE_S0B_STRUCT_CONTRACTS=${ENABLE_S0B_STRUCT_CONTRACTS:-false}
      - ENABLE_CSV_IMPORT=${ENABLE_CSV_IMPORT:-false}
    volumes:
      # Named volume — MySQL data persists across container removal and image updates.
      # Only wiped by: docker compose down -v  (never happens accidentally).
      - eve-mysql-data:/var/lib/mysql
    restart: unless-stopped

volumes:
  # Named volume for MySQL data persistence.
  # To back up: docker run --rm -v eve-mysql-data:/data -v $(pwd):/backup alpine \
  #               tar czf /backup/eve-mysql-backup.tar.gz /data
  eve-mysql-data:
